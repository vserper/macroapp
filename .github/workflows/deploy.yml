name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          echo "sgtm.ombwarehouse.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIA5NyxhtDlP66LdDsn06m12jRjALz5SXEODLwTNiFM+9" >> ~/.ssh/known_hosts
          echo "13.218.19.210 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIA5NyxhtDlP66LdDsn06m12jRjALz5SXEODLwTNiFM+9" >> ~/.ssh/known_hosts

      - name: Create app directory on server
        run: |
          ssh -i ~/.ssh/deploy.pem ubuntu@sgtm.ombwarehouse.com "mkdir -p /home/ubuntu/webapps/macro/src"

      - name: Sync source files
        run: |
          rsync -avz --delete \
            --exclude=.env \
            -e "ssh -i ~/.ssh/deploy.pem" \
            src/ \
            ubuntu@sgtm.ombwarehouse.com:/home/ubuntu/webapps/macro/src/

      - name: Ensure BASE_PATH in server .env
        run: |
          ssh -i ~/.ssh/deploy.pem ubuntu@sgtm.ombwarehouse.com \
            "grep -q 'BASE_PATH=' /home/ubuntu/webapps/macro/src/.env 2>/dev/null \
             || echo 'BASE_PATH=/macro' >> /home/ubuntu/webapps/macro/src/.env"

      - name: Rebuild and restart container
        run: |
          ssh -i ~/.ssh/deploy.pem ubuntu@sgtm.ombwarehouse.com "cd ~/webapps && ./deploy-webapp.sh macro"

      - name: Reload app code (restart container)
        run: |
          ssh -i ~/.ssh/deploy.pem ubuntu@sgtm.ombwarehouse.com "cd ~/webapps/macro && docker compose restart"
