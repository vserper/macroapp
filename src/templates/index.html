<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Macro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 540px;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    textarea {
      width: 100%;
      height: 220px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: "Consolas", "Menlo", monospace;
      color: #1a1a1a;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }
    textarea:focus { border-color: #4f6ef7; }

    .row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 14px;
    }

    .field { display: flex; flex-direction: column; }

    select {
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.88rem;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    select:focus { border-color: #4f6ef7; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 7px;
      padding: 9px 18px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    button:active { opacity: 0.82; }

    .btn-secondary {
      background: #f0f2f5;
      color: #374151;
    }
    .btn-secondary:hover { background: #e4e7eb; }

    .btn-primary {
      background: #4f6ef7;
      color: #fff;
      margin-left: auto;
    }
    .btn-primary:hover { background: #3b5be0; }
    .btn-primary:disabled { background: #a5b4fc; cursor: default; opacity: 1; }

    .status {
      margin-top: 14px;
      font-size: 0.82rem;
      color: #6b7280;
      min-height: 1.2em;
      transition: color 0.2s;
    }
    .status.ok  { color: #16a34a; }
    .status.err { color: #dc2626; }
  </style>
</head>
<body>
<div class="card">
  <h1>Form Macro</h1>

  <label for="values">Values (one per line)</label>
  <textarea id="values" placeholder="Paste values here…" spellcheck="false"></textarea>

  <div class="row">
    <div class="field">
      <label for="separator">Key between fields</label>
      <select id="separator">
        <option value="tab">Tab</option>
        <option value="enter">Enter</option>
        <option value="tab-enter">Tab + Enter</option>
      </select>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="applyDropShips()">Drop Ships</button>
    <button class="btn-secondary" onclick="applySG()">SG</button>
    <button class="btn-primary" id="copyBtn" onclick="copyToClipboard()">Copy to Clipboard</button>
  </div>

  <div class="status" id="status">Paste values above, then click Copy to Clipboard.</div>
</div>

<script>
  const ta     = document.getElementById("values");
  const sepEl  = document.getElementById("separator");
  const status = document.getElementById("status");
  const copyBtn = document.getElementById("copyBtn");

  function setStatus(msg, type) {
    status.textContent = msg;
    status.className = "status" + (type ? " " + type : "");
  }

  // ── Copy to Clipboard ──────────────────────────────────────────────────────
  function copyToClipboard() {
    const items = ta.value.split("\n").map(l => l.trim()).filter(Boolean);
    if (!items.length) { setStatus("No items to copy.", "err"); return; }

    const sep = sepEl.value;
    let joined;
    if (sep === "tab")        joined = items.join("\t");
    else if (sep === "enter") joined = items.join("\n");
    else                      joined = items.join("\t\n");   // Tab+Enter

    navigator.clipboard.writeText(joined).then(() => {
      setStatus(`Copied ${items.length} item${items.length > 1 ? "s" : ""} — click into your form and press Ctrl+V.`, "ok");
      copyBtn.textContent = "Copied!";
      setTimeout(() => { copyBtn.textContent = "Copy to Clipboard"; }, 2000);
    }).catch(() => {
      setStatus("Clipboard access denied. Try allowing clipboard permissions for this site.", "err");
    });
  }

  // ── Drop Ships ─────────────────────────────────────────────────────────────
  function applyDropShips() {
    const lines = ta.value.split("\n").map(l => l.trimEnd());

    let orderNum = "";
    for (const line of lines) {
      if (line.startsWith("Order #")) { orderNum = line.replace("Order #", "").trim(); break; }
    }

    let customer = "";
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].trim() === "Ship To Address") {
        for (let k = i + 1; k < lines.length; k++) {
          if (lines[k].trim()) { customer = lines[k].trim(); break; }
        }
        break;
      }
    }

    const results = [];
    if (orderNum || customer) {
      results.push(`PO: ${orderNum} | Customer: ${customer}`);
      results.push("");
    }

    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith("SKU:")) {
        let sku = lines[i].slice(4).trim();
        if (sku.includes("_")) sku = sku.split("_").slice(1).join("_");
        const title = i > 0 ? lines[i - 1].trim() : "";
        let qty = "";
        outer: for (let j = i + 1; j < lines.length; j++) {
          if (lines[j].startsWith("$")) {
            for (let k = j + 1; k < lines.length; k++) {
              if (lines[k].trim()) { qty = lines[k].trim(); break outer; }
            }
          }
        }
        results.push(`Qty: ${qty} - SKU: ${sku} | Item: ${title}`);
      }
    }

    if (!results.length) { setStatus("Drop Ships: no matching data found.", "err"); return; }
    ta.value = results.join("\n");
    setStatus("Drop Ships applied.", "ok");
  }

  // ── SG ─────────────────────────────────────────────────────────────────────
  function applySG() {
    const lines = ta.value.split("\n");
    const hasTab = lines.some(l => l.includes("\t") && l.trim());
    if (!hasTab) {
      setStatus("SG: no tab-separated data found — is the data copied from a spreadsheet?", "err");
      return;
    }
    const result = lines.map(line => {
      if (!line.includes("\t")) return line;
      const parts = line.split("\t");
      if (parts.length >= 2 && !parts[1].startsWith("SG")) parts[1] = "SG" + parts[1];
      return parts.join("\t");
    });
    ta.value = result.join("\n");
    setStatus("SG applied.", "ok");
  }

  // Allow Ctrl+Enter to copy
  ta.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); copyToClipboard(); }
  });
</script>
</body>
</html>
